services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: finance_dashboard
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${PORT:-4000}:4000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "${CLIENT_PORT:-8080}:80"

volumes:
  postgres_data:
