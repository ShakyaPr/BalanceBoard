services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["local-db"]
    networks:
      - app_network
    environment:
      POSTGRES_DB: ${DB_NAME:-finance_dashboard}
      POSTGRES_USER: ${DB_USER:-finance_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-finance_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-finance_user} -d ${DB_NAME:-finance_dashboard}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-finance_dashboard}
      DB_USER: ${DB_USER:-finance_user}
      DB_PASSWORD: ${DB_PASSWORD:-finance_password}
      DB_SCHEMA: ${DB_SCHEMA:-public}
    ports:
      - "${PORT:-4000}:4000"

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    restart: unless-stopped
    networks:
      - app_network
    depends_on:
      server:
        condition: service_started
    ports:
      - "${CLIENT_PORT:-8080}:80"

volumes:
  postgres_data:

networks:
  app_network:
    name: ${APP_NETWORK:-balanceboard-net}
    driver: bridge
